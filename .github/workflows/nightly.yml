name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:    # Allow manual trigger

jobs:
  nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Upload Nightly Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbps-engine-nightly
          path: target/CBPSEngine-full.jar
          retention-days: 7

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/CBPSEngine-full.jar
          tag_name: nightly-${{ github.run_number }}
          name: "Nightly Build #${{ github.run_number }}"
          prerelease: true
          body: |
            # Nightly Build - ${{ github.run_id }}

            **Built:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}

            This is an **unsupported nightly build** for testing purposes only.

            For stable releases, see the [releases page](https://github.com/comboom-sucht/cbps-engine/releases).

            ## Quick Start

            ```bash
            # macOS
            java -XstartOnFirstThread -jar CBPSEngine-full.jar

            # Linux / Windows
            java -jar CBPSEngine-full.jar
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
