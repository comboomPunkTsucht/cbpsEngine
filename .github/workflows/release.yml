name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-suffix: linux
          - os: macos-latest
            artifact-suffix: macos
          - os: windows-latest
            artifact-suffix: windows

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbps-engine-${{ matrix.artifact-suffix }}
          path: target/CBPSEngine-*.jar

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn -B test

  release:
    needs: [build, tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build final JAR
        run: mvn -B clean package -DskipTests

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "target/CBPSEngine-full.jar"
          tag: ${{ github.ref }}
          name: "CBPS Engine v${{ steps.version.outputs.version }}"
          body: |
            # CBPS Engine ${{ steps.version.outputs.version }}

            ## Build Information
            - Java Target: 17+
            - Platform: Cross-platform (Windows/macOS/Linux)
            - OpenGL: 4.1+

            ## Changes
            See [CHANGELOG.md](CHANGELOG.md) for details.

            ## Installation

            ```bash
            # macOS (requires -XstartOnFirstThread for GLFW)
            java -XstartOnFirstThread -jar CBPSEngine-full.jar

            # Linux / Windows
            java -jar CBPSEngine-full.jar
            ```

            ## Quick Start
            See [README.md](README.md) for documentation and example usage.

            ## License
            MIT License - See [LICENSE](LICENSE)
          draft: false
          prerelease: false

      - name: Publish to GitHub Packages (optional)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B deploy -DskipTests -Dmaven.test.skip=true \
            -Dregistry=https://maven.pkg.github.com \
            -Dtoken=$GITHUB_TOKEN
        continue-on-error: true
